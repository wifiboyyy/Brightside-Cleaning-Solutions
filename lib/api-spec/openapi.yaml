openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: quotes
    description: Quote request operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /quotes:
    post:
      operationId: submitQuote
      tags: [quotes]
      summary: Submit a quote request
      description: Submits a new quote request from a potential customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteRequest"
      responses:
        "201":
          description: Quote request submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
        "400":
          description: Invalid input
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    QuoteRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        phone:
          type: string
        service:
          type: string
          enum: [house_washing, driveway_cleaning, deck_patio_cleaning, other]
        address:
          type: string
        message:
          type: string
      required:
        - name
        - email
        - phone
        - service
        - address
    QuoteResponse:
      type: object
      properties:
        id:
          type: integer
        message:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - message
        - createdAt
